<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f5f2ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Health</title>
<meta name="version" content="2.1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--sf:#f8f8f6;--ink:#1a1a18;--ink2:#6b6b60;--ink3:#b0afa6;
  --accent:#2d5a3d;--acc-lt:#e8f0ea;
  --warm:#c8622a;--warm-lt:#fdf0e8;
  --blue:#3a6fa8;--blue-lt:#e8f0fb;
  --purple:#6b4a9e;--purple-lt:#f0ebfa;
  --red:#b03a3a;--red-lt:#faeaea;
  --gold:#8a7020;--gold-lt:#faf4e0;
  --teal:#2a7a7a;--teal-lt:#e0f4f4;
  --slate:#4a5568;--slate-lt:#edf0f4;
  --border:#e8e5e0;--r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Karla',sans-serif;color:var(--ink);}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
.view{display:none;flex-direction:column;height:100%;overflow:hidden;}
.view.active{display:flex;}
.body{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:80px;}
.body::-webkit-scrollbar{display:none;}

/* TOPBAR */
.topbar{padding:46px 22px 10px;flex-shrink:0;}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-end;}
.page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:var(--ink);letter-spacing:-.5px;line-height:1;}
.page-sub{font-size:13px;color:var(--ink3);margin-top:3px;font-weight:300;}
.icon-btn{width:32px;height:32px;background:var(--sf);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);}
.icon-btn:active{background:var(--border);}

/* SUBTABS */
.subtabs{display:flex;padding:0 22px;flex-shrink:0;border-bottom:1px solid var(--border);}
.stab{flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* SECTION */
.sec{padding:13px 22px 0;}
.sec-lbl{font-size:11px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}

/* STATS */
.stat-row{display:flex;gap:6px;}
.stat-box{flex:1;background:var(--sf);border:1px solid var(--border);border-radius:var(--r);padding:8px 6px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);line-height:1;}
.stat-lbl{font-size:9px;color:var(--ink3);margin-top:3px;}
.stat-box.accent{background:var(--accent);border-color:var(--accent);}
.stat-box.accent .stat-val,.stat-box.accent .stat-lbl{color:#fff;}
.stat-box.accent .stat-lbl{opacity:.7;}
.stat-box.green{background:var(--acc-lt);border-color:var(--accent);}
.stat-box.green .stat-val,.stat-box.green .stat-lbl{color:var(--accent);}

/* WATER */
.water-row{display:flex;gap:6px;align-items:center;padding:10px 12px;background:var(--sf);border:1px solid var(--border);border-radius:var(--r);}
.glass{flex:1;height:32px;border-radius:4px 4px 6px 6px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;position:relative;overflow:hidden;}
.glass::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0;background:var(--accent);opacity:.6;transition:height .3s ease;}
.glass.full{border-color:var(--accent);}
.glass.full::after{height:100%;}
.water-add{width:32px;height:32px;border-radius:7px;background:var(--acc-lt);border:1px solid var(--accent);color:var(--accent);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.water-add:active{background:var(--accent);color:#fff;}

/* MEAL CARD */
.meal-card{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:opacity .3s;margin-bottom:6px;}
.meal-card.done{opacity:.38;}
.meal-top{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.meal-icon-wrap{width:28px;height:28px;flex-shrink:0;color:var(--ink2);}
.meal-info{flex:1;min-width:0;}
.meal-type{font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);}
.meal-name{font-size:13px;font-weight:500;color:var(--ink);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meal-time{font-size:11px;color:var(--ink3);margin-top:1px;}
.check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:11px;color:transparent;}
.check.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.meal-macros{display:flex;border-top:1px solid var(--border);}
.mac{flex:1;text-align:center;padding:6px 2px;border-right:1px solid var(--border);}
.mac:last-child{border-right:none;}
.mac-v{font-family:'Playfair Display',serif;font-size:12px;color:var(--ink);}
.mac-l{font-size:9px;text-transform:uppercase;letter-spacing:.3px;color:var(--ink3);font-weight:600;}

/* WORKOUT COL */
.col-card{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.col-card-body{padding:8px;}
.mini-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);}
.mini-item:last-child{border-bottom:none;}
.mini-item.done .mini-title{text-decoration:line-through;opacity:.4;}
.mini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mini-title{flex:1;font-size:12px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:all .2s;}
.mini-check.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* TO DO */
.todo-item{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:6px;transition:opacity .3s;}
.todo-item.done{opacity:.5;}
.todo-row{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:14px;font-weight:500;color:var(--ink);}
.todo-item.done .todo-title{text-decoration:line-through;color:var(--ink3);}
.todo-del{background:none;border:none;color:var(--ink3);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;}

/* EXERCISE */
.ex-card{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:6px;}
.ex-head{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.ex-icon-wrap{width:24px;height:24px;flex-shrink:0;color:var(--ink2);}
.ex-info{flex:1;}
.ex-name{font-size:13px;font-weight:500;color:var(--ink);}
.ex-meta{font-size:11px;color:var(--ink3);margin-top:1px;}
.ex-arr{color:var(--ink3);font-size:13px;margin-left:auto;transition:transform .2s;}
.ex-card.open .ex-arr{transform:rotate(90deg);}
.ex-body{display:none;padding:0 12px 11px;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}
.ex-note{font-size:11px;color:var(--ink2);margin:8px 0 6px;line-height:1.4;}
.ex-set-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;}
.ex-set-row:last-child{border-bottom:none;}
.ex-set-n{width:16px;color:var(--ink3);font-family:'Playfair Display',serif;font-size:10px;}
.ex-set-d{flex:1;color:var(--ink);}
.ex-set-r{color:var(--ink3);font-size:10px;}

/* PLAN/RECIPE */
.week-label{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);padding:12px 22px 6px;}
.plan-list{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);margin:0 22px;overflow:hidden;}
.plan-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;}
.plan-item:last-child{border-bottom:none;}
.plan-item:active{background:var(--bg);}
.plan-day-lbl{font-size:10px;font-weight:600;color:var(--ink3);width:22px;flex-shrink:0;text-transform:uppercase;}
.plan-icon{width:20px;height:20px;flex-shrink:0;color:var(--ink2);}
.plan-name{flex:1;font-size:12px;color:var(--ink);}
.plan-tag{font-size:10px;color:var(--ink3);padding:2px 6px;background:var(--bg);border-radius:8px;border:1px solid var(--border);white-space:nowrap;}
.recipe-item{background:var(--sf);border:1px solid var(--border);border-radius:var(--r);margin:0 22px 6px;overflow:hidden;}
.recipe-head{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.recipe-icon{width:24px;height:24px;flex-shrink:0;color:var(--ink2);}
.recipe-n{font-size:13px;font-weight:500;color:var(--ink);}
.recipe-meta{font-size:11px;color:var(--ink3);margin-top:1px;}
.recipe-arr{color:var(--ink3);font-size:13px;margin-left:auto;transition:transform .2s;}
.recipe-item.open .recipe-arr{transform:rotate(90deg);}
.recipe-body{display:none;padding:0 12px 11px;border-top:1px solid var(--border);}
.recipe-item.open .recipe-body{display:block;}
.r-sub{font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);margin:10px 0 5px;}
.ing-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;}
.ing-row:last-child{border-bottom:none;}
.ing-a{color:var(--accent);font-weight:500;}
.step{display:flex;gap:7px;margin-bottom:5px;}
.step-n{font-family:'Playfair Display',serif;font-size:11px;color:var(--ink3);flex-shrink:0;width:12px;padding-top:2px;}
.step-t{font-size:12px;color:var(--ink);line-height:1.5;}

/* CALENDAR */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;}
.cal-month-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);}
.cal-nav-btn{background:none;border:none;font-size:16px;color:var(--ink3);cursor:pointer;padding:3px 7px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px;}
.cal-dow{text-align:center;font-size:9px;font-weight:600;letter-spacing:.4px;color:var(--ink3);text-transform:uppercase;padding:3px 0;}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;flex-direction:column;gap:1px;position:relative;overflow:hidden;}
.cal-cell.today{outline:2px solid var(--ink);outline-offset:-2px;font-weight:700;color:var(--ink);}
.cal-cell.active-cal{outline:2px solid var(--accent);outline-offset:-2px;color:var(--accent);font-weight:600;}
.cal-cell.today.active-cal{outline:3px solid var(--accent);outline-offset:-2px;color:var(--ink);font-weight:700;}
.cal-cell.other-month{opacity:.25;}
.cal-cell .cal-fill{position:absolute;inset:0;border-radius:7px;z-index:0;}
.cal-cell .cal-num{position:relative;z-index:1;line-height:1;}
.cal-dot{width:3px;height:3px;border-radius:50%;background:rgba(0,0,0,.25);position:relative;z-index:1;}
.cal-day-events{padding:7px 14px 0;}
.cal-ev-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--sf);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;}
.cal-ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cal-ev-name{flex:1;font-size:12px;font-weight:500;color:var(--ink);}
.cal-ev-time{font-size:11px;color:var(--ink3);}

/* ADD FAB */
.add-fab{position:absolute;bottom:86px;right:16px;width:44px;height:44px;background:var(--ink);color:#fff;border-radius:50%;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.18);z-index:40;transition:transform .2s;}
.add-fab:active{transform:scale(.92);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,24,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--sf);border-radius:18px 18px 0 0;padding:16px 20px 36px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1);max-height:90dvh;overflow-y:auto;}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-handle{width:32px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink);margin-bottom:14px;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'Karla',sans-serif;font-size:13px;color:var(--ink);}
.field input:focus{outline:none;border-color:var(--accent);}
.colour-row{display:flex;gap:5px;flex-wrap:wrap;}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .15s;}
.cswatch.sel{border-color:var(--ink);}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;font-family:'Karla',sans-serif;font-size:13px;color:var(--ink2);cursor:pointer;}
.btn-save{flex:2;padding:11px;border-radius:10px;border:none;background:var(--ink);font-family:'Karla',sans-serif;font-size:13px;font-weight:600;color:#fff;cursor:pointer;}

/* TOAST */
.toast{position:absolute;top:10px;left:10px;right:10px;background:var(--ink);border-radius:11px;padding:10px 13px;display:flex;gap:8px;align-items:center;z-index:999;transform:translateY(-130%);transition:transform .35s cubic-bezier(.34,1.4,.64,1);box-shadow:0 4px 16px rgba(0,0,0,.16);}
.toast.show{transform:translateY(0);}
.t-body{flex:1;}
.t-title{font-size:12px;font-weight:600;color:#fff;}
.t-msg{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.t-x{color:rgba(255,255,255,.3);cursor:pointer;background:none;border:none;font-size:13px;padding:0;}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;background:rgba(245,242,238,.96);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;padding:6px 0 18px;z-index:50;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;padding:5px 0;}
.nb:active{opacity:.6;}
.ni{width:20px;height:20px;color:var(--ink3);}
.ni svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.6;}
.nl{font-size:9px;color:var(--ink3);font-weight:500;margin-top:1px;}
.nb.active .nl{color:var(--accent);font-weight:600;}
.nb.active .ni{color:var(--accent);}

/* UTILS */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fi{animation:fi .22s ease both;}
.empty-state{text-align:center;padding:20px 22px;color:var(--ink3);font-size:12px;}
.card-stack{display:flex;flex-direction:column;}
.action-link{background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;text-decoration:underline;padding:0;}
</style>
</head>
<body>
<div id="app">

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="t-body"><div class="t-title" id="t-title"></div><div class="t-msg" id="t-msg"></div></div>
  <button class="t-x" onclick="hideToast()">✕</button>
</div>

<!-- ADD TODO MODAL -->
<div class="modal-overlay" id="todo-overlay" onclick="closeOvl('todo-overlay',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add item</div>
    <div class="field"><label>Title</label><input type="text" id="todo-inp" placeholder="What do you need to do?"></div>
    <div class="field">
      <label>Colour</label>
      <div class="colour-row" id="todo-swatches">
        <div class="cswatch sel" style="background:#d8e4ec" data-c="work"   onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--acc-lt)"   data-c="accent" onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--warm-lt)"  data-c="warm"   onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--blue-lt)"  data-c="blue"   onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--purple-lt)" data-c="purple" onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--red-lt)"   data-c="red"    onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--teal-lt)"  data-c="teal"   onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--gold-lt)"  data-c="gold"   onclick="pickTodoC(this)"></div>
        <div class="cswatch" style="background:var(--slate-lt)" data-c="slate"  onclick="pickTodoC(this)"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeOvl('todo-overlay')">Cancel</button>
      <button class="btn-save" onclick="saveTodo()">Add</button>
    </div>
  </div>
</div>

<!-- ══ CALENDAR ══ -->
<div class="view active" id="view-cal">
  <div class="topbar">
    <div class="topbar-row">
      <div><div class="page-title" id="cal-month-title-top">March</div><div class="page-sub" id="cal-year-sub">2026</div></div>
    </div>
  </div>
  <div class="body">
    <div class="cal-month-nav" style="padding:0 18px 6px">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div id="cal-month-title" style="font-family:'Playfair Display',serif;font-size:15px;color:var(--ink3)"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-day-events" id="cal-day-events"></div>
  </div>
</div>

<!-- ══ TODAY ══ -->
<div class="view" id="view-today">
  <div class="topbar">
    <div class="topbar-row">
      <div><div class="page-title" id="today-title">Today</div><div class="page-sub" id="today-sub">Day 1</div></div>
      <button class="icon-btn" onclick="showView('todo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
    </div>
  </div>
  <div class="body">
    <div class="sec">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="st-meals">0/3</div><div class="stat-lbl">meals</div></div>
        <div class="stat-box"><div class="stat-val" id="st-water">0/5</div><div class="stat-lbl">water</div></div>
        <div class="stat-box"><div class="stat-val" id="st-workout">-</div><div class="stat-lbl">workout</div></div>
        <div class="stat-box"><div class="stat-val" id="st-todos">0</div><div class="stat-lbl">to do</div></div>
      </div>
    </div>
    <div class="sec"><div class="sec-lbl">Water</div>
      <div class="water-row">
        <div class="glass" id="g0" onclick="tapGlass(0)"></div>
        <div class="glass" id="g1" onclick="tapGlass(1)"></div>
        <div class="glass" id="g2" onclick="tapGlass(2)"></div>
        <div class="glass" id="g3" onclick="tapGlass(3)"></div>
        <div class="glass" id="g4" onclick="tapGlass(4)"></div>
        <div class="water-add" onclick="addGlass()">+</div>
      </div>

function dateStr(d){
  const x=d||new Date();
  return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
}
const todayStr=()=>dateStr();

function planIdx(date){
  const d=date||new Date();
  const local=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
  const s=new Date(START_Y,START_M,START_D,12,0,0);
  const raw=Math.floor((local-s)/86400000);
  return ((raw%14)+14)%14;
}

function cycleStart(){
  const today=new Date();today.setHours(12,0,0,0);
  const s=new Date(START_Y,START_M,START_D,12,0,0);
  const raw=Math.floor((today-s)/86400000);
  const offset=((raw%14)+14)%14;
  const d=new Date();d.setDate(d.getDate()-offset);d.setHours(0,0,0,0);
  return d;
}

function dateForIdx(i){
  const d=cycleStart();
  d.setDate(d.getDate()+i);
  return d;
}

// ── STORAGE ────────────────────────────────────────
const gs=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

let water=gs('hp_water_'+todayStr(),0);
let doneMeals=gs('hp_done',{});
let doneItems=gs('hp_done_items',{});
let todos=gs('hp_todos',[]);
let calViewDate=new Date(new Date().getFullYear(),new Date().getMonth(),1);
let calSelDate=(()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();
let dietTab='plan';
let woTab='wplan';
let todoSelColour='work';
const C_DOT={work:'#4a7c9e',accent:'var(--accent)',warm:'var(--warm)',blue:'var(--blue)',purple:'var(--purple)',red:'var(--red)',teal:'var(--teal)',gold:'var(--gold)',slate:'var(--slate)'};

// ── CALENDAR ───────────────────────────────────────
function completionColour(ratio){
  if(ratio<=0) return null;
  const hue=Math.round(ratio*120);
  return `hsl(${hue},24%,88%)`;
}

function getDayCompletionRatio(date){
  const cs=cycleStart();
  const local=new Date(date.getFullYear(),date.getMonth(),date.getDate(),12,0,0);
  const daysSince=Math.floor((local-cs)/86400000);
  if(daysSince<0||daysSince>13) return 0;
  const ds=dateStr(date);
  const mKeys=['b_'+ds,'l_'+ds,'d_'+ds];
  const todosOnDay=todos.filter(t=>t.doneDate===ds);
  const dtKeys=DAILY_TASKS.map(t=>t.id+'_'+ds);
  // Water counts as done if >=5 glasses
  const waterKey='hp_water_'+ds;
  const waterVal=gs(waterKey,0);
  const total=mKeys.length+todosOnDay.length+dtKeys.length+1; // +1 for water
  if(total===0) return 0;
  let done=mKeys.filter(k=>!!doneMeals[k]).length;
  done+=todosOnDay.filter(t=>t.done).length;
  done+=dtKeys.filter(k=>!!doneItems[k]).length;
  done+=waterVal>=5?1:0;
  return done/total;
}

function renderCalendar(){
  const d=calViewDate;
  const titleEl=document.getElementById('cal-month-title-top');
  const yearEl=document.getElementById('cal-year-sub');
  const subEl=document.getElementById('cal-month-title');
  if(titleEl) titleEl.textContent=MF[d.getMonth()];
  if(yearEl) yearEl.textContent=d.getFullYear();
  if(subEl) subEl.textContent='';
  const grid=document.getElementById('cal-grid');if(!grid)return;grid.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(x=>{const e=document.createElement('div');e.className='cal-dow';e.textContent=x;grid.appendChild(e);});
  const first=new Date(d.getFullYear(),d.getMonth(),1);
  let sd=first.getDay();sd=(sd+6)%7;
  const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const dip=new Date(d.getFullYear(),d.getMonth(),0).getDate();
  const todayLocal=new Date();todayLocal.setHours(0,0,0,0);
  const selDs=dateStr(calSelDate);
  for(let i=sd-1;i>=0;i--){const c=document.createElement('div');c.className='cal-cell other-month';c.innerHTML=`<span class="cal-num">${dip-i}</span>`;grid.appendChild(c);}
  for(let day=1;day<=dim;day++){
    const cd=new Date(d.getFullYear(),d.getMonth(),day);
    const cdStr=dateStr(cd);
    const isT=cd.getTime()===todayLocal.getTime();
    const isS=cdStr===selDs;
    const ratio=getDayCompletionRatio(cd);
    const bg=completionColour(ratio);
    const c=document.createElement('div');
    c.className='cal-cell'+(isT?' today':'')+(isS?' active-cal':'');
    const fill=bg?`<div class="cal-fill" style="background:${bg}"></div>`:'';
    c.innerHTML=fill+`<span class="cal-num">${day}</span>`;
    c.addEventListener('click',(()=>{
      const dd=new Date(d.getFullYear(),d.getMonth(),day);
      const dds=dateStr(dd);
      return()=>{calSelDate=new Date(dd);renderCalendar();renderCalDayEvents();};
    })());
    grid.appendChild(c);
  }
  const rem=(sd+dim)%7===0?0:7-(sd+dim)%7;
  for(let i=1;i<=rem;i++){const c=document.createElement('div');c.className='cal-cell other-month';c.innerHTML=`<span class="cal-num">${i}</span>`;grid.appendChild(c);}
  renderCalDayEvents();
}

  cont.appendChild(wRow);

  // Meals with tickboxes
  [{label:'Breakfast',name:BRK.n,key:'b_'+ds},{label:'Lunch',name:lun.n,key:'l_'+ds},{label:'Dinner',name:m.n,key:'d_'+ds}].forEach(ml=>{
    const done=!!doneMeals[ml.key];
    const row=document.createElement('div');row.className='cal-ev-row';
    row.innerHTML=`<div class="cal-ev-dot" style="background:${done?'var(--accent)':'var(--border)'}"></div><div class="cal-ev-name">${ml.label} — ${ml.name}</div><button onclick="togMealCal('${ml.key}',this)" style="width:24px;height:24px;border-radius:50%;border:1.5px solid ${done?'var(--accent)':'var(--border)'};background:${done?'var(--accent)':'transparent'};cursor:pointer;font-size:11px;color:${done?'#fff':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center">${done?'✓':''}</button>`;
    cont.appendChild(row);
  });

  // Daily tasks with tickboxes
  const dtHdr=document.createElement('div');
  dtHdr.style='font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);padding:8px 0 4px;';
  dtHdr.textContent='Daily tasks';cont.appendChild(dtHdr);
  DAILY_TASKS.forEach(t=>{
    const key=t.id+'_'+ds;
    const isDone=!!doneItems[key];
    const row=document.createElement('div');row.className='cal-ev-row';
    row.innerHTML=`<div class="cal-ev-dot" style="background:${isDone?C_DOT[t.colour]:'var(--border)'}"></div><div class="cal-ev-name">${t.title}</div><button onclick="togDailyTaskCal('${key}',this)" style="width:24px;height:24px;border-radius:50%;border:1.5px solid ${isDone?C_DOT[t.colour]:'var(--border)'};background:${isDone?C_DOT[t.colour]:'transparent'};cursor:pointer;font-size:11px;color:${isDone?'#fff':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center">${isDone?'✓':''}</button>`;
    cont.appendChild(row);
  });

  // Workout if gym day
  if(isGymDay||['2','4'].includes(String(dow))){
    const planDay=idx<7?1:2;
    const session=GYM_PLAN.find(s=>s.week===planDay&&s.day===DS[dow]);
    if(session){
      const wHdr=document.createElement('div');
      wHdr.style='font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3);padding:8px 0 4px;';
      wHdr.textContent='Workout — '+session.label;cont.appendChild(wHdr);
      session.exercises.forEach(ex=>{
        const key='ex_'+ex.name.replace(/\W/g,'_')+'_'+ds;
        const isDone=!!doneItems[key];
        const row=document.createElement('div');row.className='cal-ev-row';
        row.innerHTML=`<div class="cal-ev-dot" style="background:${isDone?'var(--purple)':'var(--border)'}"></div><div class="cal-ev-name">${ex.name} <span style="color:var(--ink3);font-size:10px">${ex.sets}×${ex.reps}</span></div><button onclick="togExerciseCal('${key}',this)" style="width:24px;height:24px;border-radius:50%;border:1.5px solid ${isDone?'var(--purple)':'var(--border)'};background:${isDone?'var(--purple)':'transparent'};cursor:pointer;font-size:11px;color:${isDone?'#fff':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center">${isDone?'✓':''}</button>`;

      cont.appendChild(row);
    });
  }
}

// ── TODAY ──────────────────────────────────────────
let viewingDate = null; // null = today

function renderToday(){
  if(!document.getElementById('today-meals')) return;
  const today=new Date();today.setHours(0,0,0,0);
  const viewDate=viewingDate||today;
  const isToday=viewDate.getTime()===today.getTime();
  const idx=planIdx(viewDate);
  const m=MEALS_DATA[idx];
  const lun=getLunch(viewDate);
  const ds=dateStr(viewDate);
  const dow=viewDate.getDay();

  document.getElementById('today-title').textContent=isToday
    ? DS[dow]+', '+viewDate.getDate()+' '+MS[viewDate.getMonth()]
    : DF[dow]+' '+viewDate.getDate()+' '+MS[viewDate.getMonth()];
  document.getElementById('today-sub').textContent=isToday?'Cycle day '+(idx+1)+' of 14':'Past day — '+dateStr(viewDate);

  // Water (only for today)
  for(let i=0;i<5;i++){const g=document.getElementById('g'+i);if(g)g.className='glass'+(i<water?' full':'');}

  // Stats
  const mealsDone=['b_'+ds,'l_'+ds,'d_'+ds].filter(k=>!!doneMeals[k]).length;
  const isGymDay=['1','3','5'].includes(String(dow));
  const pendingTodos=todos.filter(t=>!t.done).length;

  setStatGreen('st-meals',mealsDone>=3,mealsDone+'/3');
  setStatGreen('st-water',water>=5,water+'/5');
  const isCardioDay=['2','4'].includes(String(dow));
  document.getElementById('st-workout').textContent=isGymDay?'gym':isCardioDay?'cardio':'rest';
  document.getElementById('st-workout').closest('.stat-box').classList.toggle('green',false);
  setStatGreen('st-todos',pendingTodos===0&&todos.length>0,pendingTodos);

  // Meals — simple cards for all meals

    {type:'Breakfast',key:'b_'+ds,n:BRK.n,c:BRK.c,p:BRK.p,carb:BRK.carb,icon:ICONS.apple},
    {type:'Lunch',    key:'l_'+ds,n:lun.n,c:lun.c,p:lun.p,carb:lun.carb,icon:ICONS.bowl},
    {type:'Dinner',   key:'d_'+ds,n:m.n,  c:m.c,  p:m.p,  carb:m.carb,  icon:ICONS.plate},
  ];
  const mw=document.getElementById('today-meals');mw.innerHTML='';
  // Only weekend lunches get expandable recipe card

    const isDone=!!doneMeals[ml.key];

      // Expandable recipe card

      card.className='recipe-item fi open';card.style.marginBottom='6px';card.style.animationDelay=(mi*.04)+'s';
      const macroStr=`${ml.c} kcal · ${ml.p}g protein · ${ml.carb}g carbs`;
      card.innerHTML=`
        <div class="recipe-head" onclick="this.closest('.recipe-item').classList.toggle('open')">
          <div class="recipe-icon">${ml.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3)">${ml.type}</span>
              ${isDone?'<span style="font-size:11px;color:var(--accent)">✓</span>':''}
            </div>
            <div class="recipe-n" style="margin-top:2px">${ml.n}</div>

          <button class="check${isDone?' on':''}" onclick="event.stopPropagation();togMeal('${ml.key}',this)" style="margin-right:6px">${isDone?'✓':''}</button>

      document.getElementById('st-workout').textContent=isGymDay?'gym':'rest';
      document.getElementById('st-workout').closest('.stat-box').classList.toggle('green',allDone);

    const session=GYM_PLAN.find(s=>s.week===planDay&&s.day===DS[dow]);
    if(session){
      const hdr=document.createElement('div');hdr.style='font-size:11px;font-weight:600;color:var(--ink2);padding:2px 0 6px;';
      hdr.textContent=session.label+' — '+session.focus;wc.appendChild(hdr);
      let allDone=true;
      session.exercises.forEach(ex=>{
        const key='ex_'+ex.name.replace(/\W/g,'_')+'_'+ds;
        const isDone=!!doneItems[key];
        if(!isDone) allDone=false;
        const row=document.createElement('div');row.className='mini-item'+(isDone?' done':'');
        row.innerHTML=`<div class="mini-dot" style="background:var(--teal)"></div><div class="mini-title">${ex.name} <span style="color:var(--ink3);font-size:10px">${ex.reps}</span></div><button class="mini-check${isDone?' on':''}" onclick="togExercise('${key}',this)">${isDone?'✓':''}</button>`;

    }

    wc.innerHTML='<div style="font-size:11px;color:var(--ink3);padding:4px 0">Rest day — Sat & Sun</div>';

  // Daily tasks
  const dtw=document.getElementById('today-daily-tasks');if(dtw){dtw.innerHTML='';
  let allDtDone=true;
  DAILY_TASKS.forEach(t=>{
    const key=t.id+'_'+ds;
    const isDone=!!doneItems[key];
    if(!isDone) allDtDone=false;
    const row=document.createElement('div');row.className='mini-item'+(isDone?' done':'');
    row.innerHTML=`<div class="mini-dot" style="background:${C_DOT[t.colour]||'#999'}"></div><div class="mini-title">${t.title}</div><button class="mini-check${isDone?' on':''}" onclick="togDailyTask('${key}',this)">${isDone?'✓':''}</button>`;
    dtw.appendChild(row);
  });}

  // Todos preview (pending only, max 3)
  const tw=document.getElementById('today-todos');tw.innerHTML='';
  const pending=todos.filter(t=>!t.done);
  if(!pending.length){
    tw.innerHTML=`<div class="empty-state" style="padding:8px 0">All done! Add more in To Do tab</div>`;

      more.textContent=`+${pending.length-3} more`;tw.appendChild(more);
    }
  }
}

function setStatGreen(id,isGreen,val){
  const el=document.getElementById(id);if(!el) return;
  if(val!==undefined) el.textContent=val;
  el.closest('.stat-box').classList.toggle('green',isGreen);
}

function togMeal(key,btn){
  doneMeals[key]=!doneMeals[key];ss('hp_done',doneMeals);
  btn.classList.toggle('on');btn.textContent=btn.classList.contains('on')?'✓':'';
  btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);
  btn.closest('.meal-card').classList.toggle('done',doneMeals[key]);
  const ds=dateStr();
  const ct=['b_'+ds,'l_'+ds,'d_'+ds].filter(k=>!!doneMeals[k]).length;
  setStatGreen('st-meals',ct>=3,ct+'/3');
  if(document.querySelector('#view-cal.active')) renderCalendar();
}

function togMealCal(key,btn){
  doneMeals[key]=!doneMeals[key];ss('hp_done',doneMeals);
  const done=doneMeals[key];
  btn.style.background=done?'var(--accent)':'transparent';
  btn.style.borderColor=done?'var(--accent)':'var(--border)';
  btn.style.color=done?'#fff':'transparent';

  btn.previousElementSibling.style.background=done?'var(--accent)':'var(--border)';

  if(document.querySelector('#view-today.active')) renderToday();
}

  doneItems[key]=!doneItems[key];ss('hp_done_items',doneItems);
  const isDone=doneItems[key];
  btn.style.background=isDone?'var(--blue)':'transparent';
  btn.style.borderColor=isDone?'var(--blue)':'var(--border)';

function tapGlass(i){water=(water===i+1)?i:i+1;ss('hp_water_'+todayStr(),water);renderToday();}
function addGlass(){if(water<5){water++;ss('hp_water_'+todayStr(),water);renderToday();}}

// ── TO DO ──────────────────────────────────────────
function openTodoModal(){
  document.getElementById('todo-inp').value='';
  document.querySelectorAll('#todo-swatches .cswatch').forEach((s,i)=>s.classList.toggle('sel',i===0));
  todoSelColour='work';
  document.getElementById('todo-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('todo-inp').focus(),300);
}

function pickTodoC(el){
  document.querySelectorAll('#todo-swatches .cswatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');todoSelColour=el.dataset.c;
}

function saveTodo(){
  const title=document.getElementById('todo-inp').value.trim();
  if(!title){showToast('Add a title','');return;}
  todos.push({id:'t_'+Date.now(),title,colour:todoSelColour,done:false,doneDate:null});
  ss('hp_todos',todos);
  closeOvl('todo-overlay');
  renderTodoList();
  renderToday();
  showToast('Added',title);
}

function togTodo(id){
  const t=todos.find(x=>x.id===id);if(!t) return;
  t.done=!t.done;
  t.doneDate=t.done?dateStr():null;
  ss('hp_todos',todos);
  renderTodoList();
  renderToday();
  if(document.querySelector('#view-cal.active')) renderCalendar();
}

function togTodoFromToday(id,btn){
  togTodo(id);
  // Update button visually
  btn.classList.add('on');btn.textContent='✓';btn.classList.add('pop');
  const card=btn.closest('.todo-item');
  if(card){card.style.transition='opacity .3s';setTimeout(()=>{card.style.opacity='0';},200);}
}

function deleteTodo(id){
  todos=todos.filter(x=>x.id!==id);
  ss('hp_todos',todos);
  renderTodoList();renderToday();
}

function clearDoneTodos(){
  if(!todos.some(t=>t.done)){showToast('None to clear','Tick items first');return;}
  if(confirm('Remove all completed items?')){
    todos=todos.filter(t=>!t.done);
    ss('hp_todos',todos);
    renderTodoList();renderToday();
    showToast('Cleared','Completed items removed');
  }
}

function renderTodoList(){
  const list=document.getElementById('todo-list');if(!list) return;
  list.innerHTML='';
  if(!todos.length){list.innerHTML=`<div class="empty-state">Nothing here yet — tap + to add</div>`;return;}
  // Pending first, then done
  [...todos.filter(t=>!t.done),...todos.filter(t=>t.done)].forEach(t=>{
    const card=document.createElement('div');card.className='todo-item fi'+(t.done?' done':'');
    card.innerHTML=`<div class="todo-row"><div class="todo-dot" style="background:${C_DOT[t.colour]||'#999'}"></div><div class="todo-body"><div class="todo-title">${t.title}</div></div><button class="check${t.done?' on':''}" onclick="togTodo('${t.id}')">${t.done?'✓':''}</button><button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button></div>`;
    list.appendChild(card);
  });
}

// ── DIET ───────────────────────────────────────────

}

                <span class="recipe-n">${m.d} — ${m.n}</span>
                ${isDone?'<span style="font-size:11px;color:var(--accent)">✓</span>':''}
              </div>
              <div class="recipe-meta">${macroStr}</div>
            </div>
            <div class="recipe-arr">›</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid var(--border);background:var(--bg)">
            <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);width:42px;flex-shrink:0">Lunch</span>

              </div>

      {cat:'Carbs & Grains',items:['Wholegrain pasta','Brown rice','Wholegrain wraps','Seeded bread','Oatcakes','Wholegrain noodles','Red lentils']},
      {cat:'Dairy',items:['Greek yogurt','Milk','Grated cheese']},
      {cat:'Cupboard',items:['Olive oil','Soy sauce','Pesto','Curry powder','Chilli+cumin+paprika','Chicken stock cubes','Chia seeds','Peanut butter','Hummus']},

// ── TOAST ──────────────────────────────────────────
let _tt;
function showToast(title,msg){
  document.getElementById('t-title').textContent=title;
  document.getElementById('t-msg').textContent=msg||'';
  document.getElementById('toast').classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(hideToast,2800);
}
function hideToast(){document.getElementById('toast').classList.remove('show');}

// ── MODAL ──────────────────────────────────────────
function closeOvl(id,e){
  if(e&&e.target!==document.getElementById(id)) return;
  document.getElementById(id).classList.remove('show');
}

// ── EXPORT / IMPORT ────────────────────────────────
function exportData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&(k.startsWith('hp_')||k.startsWith('shop_'))){
      try{data[k]=JSON.parse(localStorage.getItem(k));}catch{data[k]=localStorage.getItem(k);}
    }
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='health_backup_'+dateStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Exported','Backup saved to downloads');
}

function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(confirm('Import this backup? Your current data will be replaced.')){
          Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
          showToast('Imported','Data restored');
          setTimeout(()=>location.reload(),800);
        }
      } catch{showToast('Error','Invalid backup file');}
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData(){
  if(confirm('Clear all stored data? This resets everything.')){
    for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k)localStorage.removeItem(k);}
    showToast('Cleared','All data reset');
    setTimeout(()=>location.reload(),800);
  }
}

// ── VIEWS ──────────────────────────────────────────
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='cal') renderCalendar();
  else if(name==='today'){viewingDate=null;renderToday();}
  else if(name==='todo') renderTodoList();
  else if(name==='diet') renderDietBody();
  else if(name==='workout') renderWorkoutBody();
}
